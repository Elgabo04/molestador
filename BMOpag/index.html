<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 BMO - Control Remoto</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }
    .card:hover {
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #555;
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .avatar {
      font-size: 4.5rem;
      margin-bottom: 10px;
    }
    .status-box {
      background: #eef2f7;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 25px;
      font-size: 0.95rem;
      color: #333;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      background: #1a73e8;
      box-shadow: 0 6px 14px rgba(26, 115, 232, 0.3);
      width: 100%;
      margin-top: 8px;
    }
    .btn:hover {
      background: #1557b0;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(26, 115, 232, 0.4);
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-secondary {
      background: #34a853;
      box-shadow: 0 6px 14px rgba(52, 168, 83, 0.3);
    }
    .btn-secondary:hover {
      background: #2d8f47;
    }
    .btn-danger {
      background: #ea4335;
      box-shadow: 0 6px 14px rgba(234, 67, 53, 0.3);
    }
    .btn-danger:hover {
      background: #c5221f;
    }
    .log-area {
      margin-top: 25px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
      text-align: left;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e0e4e8;
      color: #333;
    }
    .log-area p {
      margin: 4px 0;
      border-bottom: 1px solid #eee;
      padding: 4px 0;
    }
    .log-area .time {
      color: #888;
      font-size: 0.75rem;
      margin-right: 6px;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .badge {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">🤖</div>
    <h1>BMO <span class="badge">TDAH</span></h1>
    <p class="subtitle">Asistente para gestión de tareas</p>

    <div class="status-box" id="statusBox">
      <span id="statusText">✅ Conectado a Firebase</span>
    </div>

    <button class="btn" id="btnEstudio">📚 Iniciar Estudio</button>
    <button class="btn btn-secondary" id="btnGym" style="margin-top: 12px;">🏋️ Preparar Gym</button>
    <button class="btn btn-danger" id="btnReset" style="margin-top: 12px; background: #888; box-shadow: none;">🔄 Resetear Tareas</button>

    <div class="log-area" id="logArea">
      <p><span class="time">🟢</span> Sistema iniciado. Esperando acciones...</p>
    </div>
    <div class="footer">v1.0 · Firebase Realtime Database</div>
  </div>

  <!-- 🔥 Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // ============================================================
    // 1. CONFIGURACIÓN DE FIREBASE (¡YA CON TUS CREDENCIALES!)
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCLTOytJriAStEInDwgiacFudrbATEEII",
      authDomain: "bmo-tdah.firebaseapp.com",
      databaseURL: "https://bmo-tdah-default-rtdb.firebaseio.com",
      projectId: "bmo-tdah",
      storageBucket: "bmo-tdah.firebasestorage.app",
      messagingSenderId: "156416136166",
      appId: "1:156416136166:web:754dc255f1272aebfcbc27",
      measurementId: "G-PDQMW2MQ1W"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ============================================================
    // 2. REFERENCIAS A LA BASE DE DATOS
    // ============================================================
    const tareasRef = database.ref('/tareas');
    const pendienteRef = database.ref('/tareas/pendiente');
    const estadoRef = database.ref('/tareas/estudio');

    // ============================================================
    // 3. FUNCIONES PARA ACTUALIZAR LA INTERFAZ
    // ============================================================
    function agregarLog(mensaje, tipo = 'info') {
      const log = document.getElementById('logArea');
      const p = document.createElement('p');
      const now = new Date();
      const hora = now.toLocaleTimeString();
      const icono = tipo === 'exito' ? '✅' : tipo === 'error' ? '❌' : 'ℹ️';
      p.innerHTML = `<span class="time">${hora}</span> ${icono} ${mensaje}`;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }

    function actualizarEstado(texto, tipo = 'info') {
      const statusBox = document.getElementById('statusText');
      const emoji = tipo === 'exito' ? '✅' : tipo === 'error' ? '❌' : '🟢';
      statusBox.innerHTML = `${emoji} ${texto}`;
      if (tipo === 'exito') {
        statusBox.parentElement.style.background = '#e6f4ea';
      } else if (tipo === 'error') {
        statusBox.parentElement.style.background = '#fce8e6';
      } else {
        statusBox.parentElement.style.background = '#eef2f7';
      }
    }

    // ============================================================
    // 4. ENVIAR ÓRDENES A FIREBASE
    // ============================================================
    function enviarOrden(tipo) {
      let logMsg = '';
      switch (tipo) {
        case 'estudio':
          logMsg = '📚 Misión de estudio iniciada desde la web.';
          break;
        case 'gym':
          logMsg = '🏋️ Misión de gym iniciada desde la web.';
          break;
        default:
          return;
      }

      agregarLog(logMsg, 'info');
      actualizarEstado('⏳ Enviando orden...', 'info');

      tareasRef.update({
        pendiente: true,
        tipo: tipo,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        estado: 'pendiente'
      })
      .then(() => {
        agregarLog(`✅ Orden "${tipo}" enviada a Firebase.`, 'exito');
        actualizarEstado('✅ Orden enviada. Esperando respuesta de BMO...', 'exito');
      })
      .catch((error) => {
        agregarLog(`❌ Error al enviar: ${error.message}`, 'error');
        actualizarEstado('❌ Error de conexión.', 'error');
      });
    }

    function resetearTareas() {
      tareasRef.update({
        pendiente: false,
        tipo: '',
        estado: 'reset'
      })
      .then(() => {
        agregarLog('🔄 Tareas reseteadas.', 'info');
        actualizarEstado('🔄 Sistema reiniciado.', 'info');
      })
      .catch((error) => {
        agregarLog(`❌ Error al resetear: ${error.message}`, 'error');
      });
    }

    // ============================================================
    // 5. ESCUCHAR CAMBIOS DESDE FIREBASE (Actualizar la UI)
    // ============================================================
    estadoRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const estado = data.estado || '';
        const mensaje = data.mensaje || '';
        if (estado === 'completada') {
          agregarLog(`🎉 Misión completada: ${mensaje}`, 'exito');
          actualizarEstado('✅ ¡Misión completada!', 'exito');
        } else if (estado === 'fallida') {
          agregarLog(`❌ Misión fallida: ${mensaje}`, 'error');
          actualizarEstado('❌ Misión fallida. Intenta de nuevo.', 'error');
        } else if (estado === 'en_progreso') {
          agregarLog(`⏳ Misión en progreso: ${mensaje}`, 'info');
          actualizarEstado('⏳ BMO está trabajando...', 'info');
        }
      }
    });

    // ============================================================
    // 6. EVENTOS DE LOS BOTONES
    // ============================================================
    document.getElementById('btnEstudio').addEventListener('click', () => {
      enviarOrden('estudio');
    });

    document.getElementById('btnGym').addEventListener('click', () => {
      enviarOrden('gym');
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      if (confirm('¿Estás seguro de resetear todas las tareas?')) {
        resetearTareas();
      }
    });

    // ============================================================
    // 7. INICIALIZAR
    // ============================================================
    agregarLog('🟢 Conectado a Firebase.', 'info');
    actualizarEstado('✅ Conectado a Firebase. Esperando acción.', 'info');

  </script>
</body>
</html>
